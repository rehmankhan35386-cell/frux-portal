<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRUX | YT SUPREME</title>
    <style>
        :root {
            /* CYBER VIPER PALETTE + PINK LIQUID */
            --bg-deep: #02020a;
            --panel: rgba(10, 10, 26, 0.65); /* Translucent Glass */
            --border: rgba(0, 136, 255, 0.15);
            --neon-blue: #0088ff;
            --neon-cyan: #00ffff;
            --neon-pink: #ff007f; /* Liquid Pink Color */
            --danger: #ff0044;
            --success: #00ff88;
            --text-bright: #ffffff;
            --text-dim: #7d8597;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-deep); color: var(--text-bright); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; overflow: hidden; position: relative; }

        /* FANCY STAR BACKGROUND */
        #particles-js { position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: -1; opacity: 0.2; }

        /* CLEAN PINK LIQUID (Peeche dhire-dhire Expand/Ripples chalta rahega) */
        .pink-liquid-bg {
            position: absolute; width: 200%; height: 200%; top: -50%; left: -50%;
            background: radial-gradient(circle, rgba(255, 0, 127, 0.08) 0%, transparent 70%);
            z-index: -2;
            animation: liquidRipple 20s infinite ease-in-out;
            pointer-events: none;
        }

        @keyframes liquidRipple {
            0%, 100% { transform: scale(1) translate(0, 0); opacity: 0.3; }
            25% { transform: scale(1.1) translate(5%, -5%); opacity: 0.5; }
            50% { transform: scale(1.05) translate(-3%, 3%); opacity: 0.4; }
            75% { transform: scale(1.1) translate(2%, 2%); opacity: 0.5; }
        }

        .terminal-container {
            width: 100%;
            max-width: 500px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6), inset 0 0 20px rgba(255,255,255,0.03);
            backdrop-filter: blur(25px);
            animation: containerEntry 0.6s ease-out forwards;
            z-index: 10;
        }

        /* HEADER & WOBBLING TEXT */
        .term-header { border-bottom: 2px solid var(--border); padding-bottom: 20px; margin-bottom: 30px; text-align: center; }
        
        .brand-box h1 { 
            font-size: 32px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; color: #fff;
            text-shadow: 0 0 15px rgba(255,255,255,0.6); font-family: 'Consolas', monospace;
            display: inline-block;
            animation: textWobble 4s infinite ease-in-out;
        }
        .brand-box p { font-size: 11px; color: var(--neon-cyan); letter-spacing: 3px; margin-top: 5px; text-shadow: 0 0 5px var(--neon-cyan); }
        
        @keyframes textWobble {
            0%, 100% { transform: rotate(-1deg) translateY(0px); }
            50% { transform: rotate(1.5deg) translateY(-3px); }
        }

        /* INPUT AREA */
        .token-input {
            width: 100%; padding: 18px; background: rgba(0, 0, 0, 0.4); border: 1px solid var(--border); border-radius: 12px;
            color: var(--neon-cyan); font-size: 14px; outline: none; margin-bottom: 25px; transition: 0.3s;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5); font-family: 'Consolas', monospace;
        }
        .token-input:focus { border-color: var(--neon-blue); box-shadow: 0 0 15px rgba(0, 136, 255, 0.3); }

        /* NEON BUTTONS */
        .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn {
            padding: 16px; border: none; border-radius: 10px; font-size: 12px; font-weight: bold; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1.5px; transition: 0.4s; position: relative; overflow: hidden;
        }
        .btn:active { transform: scale(0.97); }
        .btn-scan { background: var(--neon-blue); color: #fff; box-shadow: 0 5px 20px -2px var(--neon-blue); }
        .btn-scan:hover { box-shadow: 0 8px 30px var(--neon-blue); filter: brightness(1.1); }
        .btn-cancel { background: transparent; border: 1.5px solid var(--danger); color: var(--danger); }
        .btn-cancel:hover { background: var(--danger); color: #fff; box-shadow: 0 5px 20px -3px var(--danger); }

        /* RESULT BOXES WITH GLOW */
        #data-display { display: none; margin-top: 35px; animation: slideUpFade 0.4s ease-out forwards; }
        .box { background: rgba(5, 5, 20, 0.6); border: 1px solid var(--border); padding: 20px; margin-bottom: 15px; border-radius: 12px; position: relative; transition: 0.3s; }
        .box-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px; display: block; letter-spacing: 1px; }
        .box-value { font-size: 15px; font-weight: 600; color: #fff; font-family: 'Consolas', monospace; word-break: break-all; }

        /* JSON RAW LOG (With copy support) */
        .log-container { position: relative; margin-top: 15px; }
        .log-wrap { background: #010103; padding: 20px; border: 1px solid var(--border); font-size: 11px; color: #d1d5db; line-height: 1.6; white-space: pre-wrap; overflow-x: auto; border-radius: 8px; font-family: 'Consolas', monospace; }
        .copy-btn { position: absolute; top: 12px; right: 12px; background: rgba(255, 255, 255, 0.1); color: #fff; border: none; padding: 5px 12px; font-size: 10px; border-radius: 4px; cursor: pointer; text-transform: uppercase; }

        /* ANIMATIONS */
        @keyframes containerEntry { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes slideUpFade { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="particles-js"></div>
<div class="pink-liquid-bg"></div> <div class="terminal-container">
    <div class="term-header">
        <div class="brand-box">
            <h1>FRUX YT</h1> <p>ADVANCED SESSION DECODER</p>
        </div>
    </div>

    <input type="text" id="tk-input" class="token-input" placeholder="0x000... (Paste Access Token)">

    <div class="action-row">
        <button class="btn btn-scan" onclick="processApi('scan')">Full Analysis</button>
        <button class="btn btn-cancel" onclick="processApi('cancel')">Pending Gmail Cancel</button>
    </div>

    <div id="data-display">
        <div class="box" style="border-left: 2px solid var(--neon-blue);">
            <span class="box-label">Linked_Email</span>
            <span class="box-value" id="v-linked">...</span>
        </div>
        <div class="box" id="p-box" style="border-left: 2px solid var(--text-dim);">
            <span class="box-label">Pending_Email</span>
            <span class="box-value" id="v-pending">...</span>
        </div>

        <div class="log-container">
            <button class="copy-btn" onclick="copyJSON()">Copy Data</button>
            <div class="log-wrap" id="json-raw">Connecting to Garena server...</div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
    particlesJS("particles-js", { "particles": { "number": { "value": 70, "density": { "enable": true, "value_area": 800 } }, "color": { "value": "#ffffff" }, "opacity": { "value": 0.2, "random": true }, "size": { "value": 1.5, "random": true }, "move": { "enable": true, "speed": 0.8, "direction": "none", "random": true, "out_mode": "out" } } });

    async function processApi(mode) {
        const tk = document.getElementById('tk-input').value;
        if(!tk) return;

        try {
            // TERMUX LOGIC: POST for Cancel, GET for Info
            const method = mode === 'scan' ? 'GET' : 'POST';
            const endpoint = mode === 'scan' ? 'get_bind_info' : 'cancel_request';
            const url = `/api/game/account_security/bind:${endpoint}?app_id=100067&access_token=${tk}`;

            const res = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
            });
            
            const data = await res.json();

            // Display exactly like frux.py
            document.getElementById('json-raw').innerText = JSON.stringify(data, null, 2);

            // Extract Logic
            const current = data.email || "Not Linked";
            const pending = data.email_to_be_bind || data.email_to_be || "null";

            document.getElementById('v-linked').innerText = current;
            const vPend = document.getElementById('v-pending');
            const pBox = document.getElementById('p-box');

            if(pending !== "null") {
                vPend.innerText = pending;
                vPend.style.color = "var(--danger)";
                vPend.style.textShadow = "0 0 10px rgba(255, 0, 68, 0.4)";
                pBox.style.borderLeftColor = "var(--danger)";
            } else {
                vPend.innerText = "NO PENDING REQUESTS";
                vPend.style.color = "var(--success)";
                vPend.style.textShadow = "0 0 10px rgba(0, 255, 136, 0.4)";
                pBox.style.borderLeftColor = "var(--success)";
            }

            document.getElementById('data-display').style.display = 'block';

            if(mode === 'cancel') {
                alert("TERMINATION COMMAND SENT!");
                processApi('scan'); // Refresh data
            }

        } catch (e) {
            alert("BYPASS FAILED: Check Netlify Redirects");
        }
    }

    function copyJSON() {
        const text = document.getElementById('json-raw').innerText;
        navigator.clipboard.writeText(text).then(() => alert("Raw Data Copied!"));
    }
</script>
</body>
</html>
