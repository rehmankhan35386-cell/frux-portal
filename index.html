<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRUX | ULTRA MAX TERMINAL</title>
    <style>
        :root {
            --bg: #010409;
            --cyan: #00f3ff;
            --purple: #bc13fe;
            --red: #ff003c;
            --green: #00ff9d;
            --glass: rgba(15, 23, 42, 0.9);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Consolas', 'Courier New', monospace; }
        
        body { background-color: var(--bg); color: #fff; min-height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }

        /* ULTRA BACKGROUND */
        #particles-js { position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: -1; }

        .main-frame {
            width: 100%;
            max-width: 460px;
            padding: 30px;
            background: var(--glass);
            border: 1px solid rgba(188, 19, 254, 0.4);
            border-radius: 24px;
            backdrop-filter: blur(25px);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), inset 0 0 15px rgba(188, 19, 254, 0.1);
            z-index: 10;
        }

        .logo-text {
            font-size: 55px;
            font-weight: 900;
            text-align: center;
            background: linear-gradient(to bottom, var(--cyan), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(0, 243, 255, 0.4));
            letter-spacing: 8px;
            margin-bottom: 30px;
        }

        /* INPUT AREA */
        .ultra-input {
            width: 100%;
            padding: 18px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid var(--purple);
            border-radius: 12px;
            color: var(--cyan);
            font-size: 14px;
            outline: none;
            text-align: center;
            margin-bottom: 20px;
            transition: 0.3s;
        }
        .ultra-input:focus { border-color: var(--cyan); box-shadow: 0 0 15px rgba(0, 243, 255, 0.2); }

        /* BUTTONS */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .neon-btn {
            padding: 16px;
            border: none;
            border-radius: 10px;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .btn-scan { background: var(--purple); color: #fff; box-shadow: 0 0 15px rgba(188, 19, 254, 0.4); }
        .btn-cancel { background: var(--red); color: #fff; box-shadow: 0 0 15px rgba(255, 0, 60, 0.4); }
        .neon-btn:hover { transform: translateY(-2px); filter: brightness(1.2); }

        /* JSON OUTPUT BOX - AS REQUESTED */
        #result-area { display: none; margin-top: 30px; animation: slideUp 0.5s ease; }
        
        .terminal-header {
            font-size: 10px;
            color: var(--muted);
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            padding: 0 5px;
        }

        .raw-json-box {
            background: #000;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid var(--purple);
            font-size: 12px;
            line-height: 1.5;
            color: #d1d5db;
            text-align: left;
            position: relative;
            box-shadow: inset 0 0 10px rgba(188, 19, 254, 0.2);
        }

        /* JSON COLORING */
        .j-key { color: var(--cyan); }
        .j-val { color: #d2a8ff; }
        .j-num { color: #ffa657; font-weight: bold; }
        .j-bool { color: var(--red); font-weight: bold; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="particles-js"></div>

<div class="main-frame">
    <h1 class="logo-text">FRUX</h1>

    <input type="text" id="tk-input" class="ultra-input" placeholder="PASTE ACCESS_TOKEN">

    <div class="btn-grid">
        <button class="neon-btn btn-scan" onclick="runUltraAction('scan')">Deep Scan</button>
        <button class="neon-btn btn-cancel" onclick="runUltraAction('cancel')">Cancel</button>
    </div>

    <div id="loading" style="display:none; margin-top: 25px; color: var(--cyan); text-align: center; font-size: 12px;">
        [SYSTEM] SCANNING DATABASE...
    </div>

    <div id="result-area">
        <div class="terminal-header">
            <span>DATABASE_OUTPUT_LOG</span>
            <span id="status-tag" style="color: var(--green);">[STABLE]</span>
        </div>
        
        <div class="raw-json-box">
            {<br>
            &nbsp;&nbsp;<span class="j-key">"email"</span>: <span class="j-val" id="out-email">"..."</span>,<br>
            &nbsp;&nbsp;<span class="j-key">"pending_request"</span>: <span class="j-val" id="out-pending">null</span>,<br>
            &nbsp;&nbsp;<span class="j-key">"countdown_timer"</span>: <span class="j-num" id="out-timer">00</span>,<br>
            &nbsp;&nbsp;<span class="j-key">"auth_status"</span>: <span class="j-val" id="out-auth">"READY"</span>,<br>
            &nbsp;&nbsp;<span class="j-key">"is_secure"</span>: <span class="j-bool" id="out-secure">true</span><br>
            }
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
    particlesJS("particles-js", {
        "particles": {
            "number": { "value": 100 },
            "color": { "value": "#ffffff" },
            "size": { "value": 1.5 },
            "line_linked": { "enable": true, "distance": 120, "color": "#bc13fe", "opacity": 0.2 },
            "move": { "enable": true, "speed": 1 }
        }
    });

    async function runUltraAction(type) {
        const tk = document.getElementById('tk-input').value;
        if(!tk) return alert("TOKEN EMPTY!");

        document.getElementById('loading').style.display = 'block';
        document.getElementById('result-area').style.display = 'none';

        try {
            // Hum yahan redirect ka use karenge taaki Garena block na kare
            let url = (type === 'scan') 
                ? `/api/game/account_security/bind:get_bind_info?app_id=100067&access_token=${tk}`
                : `/api/game/account_security/bind:cancel_request?app_id=100067&access_token=${tk}`;

            const res = await fetch(url);
            const data = await res.json();

            // Populate JSON structure
            document.getElementById('out-email').innerText = `"${data.email || 'None'}"`;
            
            const pending = data.email_to_be_bind || data.email_to_be || "null";
            document.getElementById('out-pending').innerText = pending === "null" ? "null" : `"${pending}"`;
            
            document.getElementById('out-timer').innerText = data.request_exec_countdown || "00";
            document.getElementById('out-auth').innerText = `"${data.error_message || 'SUCCESS'}"`;
            
            // Security Check
            const isSecure = pending === "null";
            document.getElementById('out-secure').innerText = isSecure;
            document.getElementById('status-tag').innerText = isSecure ? "[SECURE]" : "[DANGER]";
            document.getElementById('status-tag').style.color = isSecure ? "var(--green)" : "var(--red)";

            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('result-area').style.display = 'block';
            }, 800);

        } catch (err) {
            alert("Connection Error! Check _redirects.");
            document.getElementById('loading').style.display = 'none';
        }
    }
</script>
</body>
</html>
