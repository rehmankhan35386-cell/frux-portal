<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRUX | OFFICIAL HUB</title>
    <style>
        :root {
            --bg: #020617;
            --card: #0f172a;
            --cyan: #22d3ee;
            --purple: #a855f7;
            --green: #10b981;
            --text: #f8fafc;
            --muted: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg); color: var(--text); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }

        .viewport { width: 100%; max-width: 420px; text-align: center; }
        .logo { font-size: 50px; font-weight: 900; color: var(--cyan); text-shadow: 0 0 20px rgba(34, 211, 238, 0.3); margin-bottom: 5px; }
        .tagline { font-size: 10px; color: var(--muted); letter-spacing: 5px; text-transform: uppercase; margin-bottom: 40px; }

        /* MENU SCREEN */
        #menu-screen { display: grid; gap: 20px; animation: fadeIn 0.5s ease; }
        .card { background: var(--card); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; padding: 25px; cursor: pointer; transition: 0.3s; border-left: 5px solid var(--cyan); text-align: left; }
        .card:hover { transform: translateY(-5px); border-color: var(--cyan); }
        .card h3 { color: var(--cyan); margin-bottom: 8px; font-size: 20px; }
        .card p { font-size: 13px; color: var(--muted); line-height: 1.4; }

        /* INPUT SCREENS */
        .screen { display: none; width: 100%; animation: slideIn 0.4s ease; }
        .input-box { width: 100%; padding: 18px; background: var(--card); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; color: #fff; font-size: 16px; margin-bottom: 15px; outline: none; }
        .input-box:focus { border-color: var(--cyan); }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 15px; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.3s; font-size: 14px; }
        .btn-primary { background: var(--cyan); color: var(--bg); }
        .btn-purple { background: var(--purple); color: #fff; }
        .btn-outline { background: transparent; border: 1px solid var(--muted); color: var(--muted); margin-top: 20px; }

        /* RESULTS AREA */
        #loading { display: none; margin-top: 20px; color: var(--cyan); font-weight: bold; }
        .result-box { display: none; background: var(--card); border-radius: 20px; padding: 25px; text-align: left; border-left: 5px solid var(--purple); margin-top: 20px; }
        .data-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .data-label { color: var(--muted); font-size: 12px; text-transform: uppercase; }
        .data-val { font-weight: bold; color: #fff; word-break: break-all; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

<div class="viewport">
    <div class="logo">FRUX</div>
    <p class="tagline">Deep Scan Portal</p>

    <div id="menu-screen">
        <div class="card" onclick="openScreen('uid-screen')">
            <h3>UID Checker</h3>
            <p>Get player details and account security status instantly.</p>
        </div>
        <div class="card" style="border-left-color: var(--purple);" onclick="openScreen('scan-screen')">
            <h3>Token Deep Scan</h3>
            <p>Real-time Garena API check for bind emails and timers.</p>
        </div>
    </div>

    <div id="uid-screen" class="screen">
        <input type="number" id="uid-input" class="input-box" placeholder="Enter Game UID...">
        <button class="btn btn-primary" onclick="runAction('uid')">Fetch Profile</button>
        <button class="btn btn-outline" onclick="goHome()">Back to Menu</button>
    </div>

    <div id="scan-screen" class="screen">
        <input type="text" id="tk-input" class="input-box" placeholder="Paste Access Token...">
        <button class="btn btn-purple" onclick="runAction('scan')">Analyze Bind Info</button>
        <button class="btn btn-outline" onclick="goHome()">Back to Menu</button>
    </div>

    <div id="loading">CONNECTING TO GARENA CORE...</div>

    <div id="result-view" class="result-box">
        <div id="res-content"></div>
        <button class="btn btn-outline" onclick="goHome()">New Scan</button>
    </div>
</div>

<script>
    function openScreen(id) {
        document.getElementById('menu-screen').style.display = 'none';
        document.getElementById(id).style.display = 'block';
    }

    function goHome() {
        document.querySelectorAll('.screen, #result-view, #loading').forEach(s => s.style.display = 'none');
        document.getElementById('menu-screen').style.display = 'grid';
        document.querySelectorAll('input').forEach(i => i.value = '');
    }

    async function runAction(type) {
        const val = type === 'uid' ? document.getElementById('uid-input').value : document.getElementById('tk-input').value;
        if(!val) return alert("Data enter karo bhai!");

        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        document.getElementById('loading').style.display = 'block';

        if(type === 'uid') {
            // Simulated UID Checker Logic
            setTimeout(() => showResult(`
                <div class="data-row"><span class="data-label">Name</span><span class="data-val">PLAYER_${val.substring(0,4)}</span></div>
                <div class="data-row"><span class="data-label">Level</span><span class="data-val">71</span></div>
                <div class="data-row"><span class="data-label">Status</span><span style="color:var(--green)">PROTECTED</span></div>
            `), 1500);
        } else {
            // REAL GARENA API LOGIC
            try {
                // Using '/api/' prefix which matches our _redirects rule
                const res = await fetch(`/api/game/account_security/bind:get_bind_info?app_id=100067&access_token=${val}`);
                const data = await res.json();
                
                const current = data.email || "Not Linked";
                const pending = data.email_to_be_bind || data.email_to_be || null;
                const time = data.request_exec_countdown || 0;

                let html = `<div class="data-row"><span class="data-label">Current Email</span><span class="data-val">${current}</span></div>`;
                if(pending) {
                    html += `
                        <div class="data-row" style="color:var(--cyan)"><span class="data-label">Pending Bind</span><span class="data-val">${pending}</span></div>
                        <div class="data-row" style="color:var(--cyan)"><span class="data-label">Countdown</span><span class="data-val">${time}s</span></div>
                    `;
                } else {
                    html += `<div style="color:var(--green); font-size:12px; margin-top:10px;">[✓] NO PENDING REQUESTS FOUND</div>`;
                }
                showResult(html);
            } catch (err) {
                alert("Connection Error! Netlify par host karo tabhi real data aayega.");
                goHome();
            }
        }
    }

    function showResult(html) {
        document.getElementById('loading').style.display = 'none';
        const resView = document.getElementById('result-view');
        document.getElementById('res-content').innerHTML = html;
        resView.style.display = 'block';
    }
</script>

</body>
</html>
