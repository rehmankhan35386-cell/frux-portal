<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRUX | CORE</title>
    <style>
        :root {
            --bg-deep: #0a0a0c;
            --panel: #121214;
            --border: #2a2a2e;
            --accent: #3b82f6; /* Subtle Blue */
            --text-main: #e4e4e7;
            --text-dim: #71717a;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', -apple-system, sans-serif; }
        body { background-color: var(--bg-deep); color: var(--text-main); min-height: 100vh; display: flex; justify-content: center; align-items: center; }

        /* Smooth Star Background */
        #particles-js { position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: -1; opacity: 0.4; }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header { margin-bottom: 35px; text-align: left; border-left: 3px solid var(--accent); padding-left: 15px; }
        .header h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
        .header p { font-size: 12px; color: var(--text-dim); text-transform: uppercase; margin-top: 4px; }

        .input-group { margin-bottom: 25px; }
        .input-label { display: block; font-size: 11px; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase; font-weight: 600; }
        
        .elite-input {
            width: 100%;
            padding: 14px 16px;
            background: #18181b;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }
        .elite-input:focus { border-color: var(--accent); background: #1c1c21; }

        .actions { display: grid; grid-template-columns: 1.5fr 1fr; gap: 12px; }
        .btn {
            padding: 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
        }
        .btn-main { background: var(--accent); color: #fff; }
        .btn-cancel { background: transparent; border: 1px solid var(--border); color: var(--text-main); }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

        /* RAW JSON LOG */
        #output-section { display: none; margin-top: 35px; animation: fadeIn 0.4s ease forwards; }
        .log-label { font-size: 10px; color: var(--text-dim); margin-bottom: 10px; display: block; }
        
        .json-log {
            background: #000;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            font-family: 'SFMono-Regular', Consolas, monospace;
            font-size: 12px;
            line-height: 1.6;
            color: #d1d5db;
        }
        .j-key { color: #94a3b8; }
        .j-str { color: #60a5fa; }
        .j-num { color: #fbbf24; }
        .j-status { padding: 2px 6px; border-radius: 4px; font-weight: bold; font-size: 10px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="particles-js"></div>

<div class="container">
    <div class="header">
        <h1>FRUX CORE</h1>
        <p>Security Analysis Terminal</p>
    </div>

    <div class="input-group">
        <label class="input-label">Authentication Token</label>
        <input type="text" id="tk-input" class="elite-input" placeholder="Enter session token...">
    </div>

    <div class="actions">
        <button class="btn btn-main" onclick="executeAction('scan')">Execute Scan</button>
        <button class="btn btn-cancel" onclick="executeAction('cancel')">Cancel Request</button>
    </div>

    <div id="output-section">
        <span class="log-label">System_Response_Log</span>
        <div class="json-log">
            {<br>
            &nbsp;&nbsp;<span class="j-key">"identity"</span>: <span class="j-str" id="o-email">"..."</span>,<br>
            &nbsp;&nbsp;<span class="j-key">"request_pending"</span>: <span class="j-str" id="o-pending">null</span>,<br>
            &nbsp;&nbsp;<span class="j-key">"exec_countdown"</span>: <span class="j-num" id="o-timer">00</span>,<br>
            &nbsp;&nbsp;<span class="j-key">"api_status"</span>: <span class="j-str" id="o-msg">"IDLE"</span>,<br>
            &nbsp;&nbsp;<span class="j-key">"security_flag"</span>: <span id="o-flag">"--"</span><br>
            }
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
    particlesJS("particles-js", {
        "particles": {
            "number": { "value": 60 },
            "color": { "value": "#ffffff" },
            "opacity": { "value": 0.2 },
            "size": { "value": 1 },
            "move": { "speed": 0.5 }
        }
    });

    async function executeAction(type) {
        const tk = document.getElementById('tk-input').value;
        if(!tk) return;

        document.getElementById('output-section').style.display = 'none';

        try {
            let url = (type === 'scan') 
                ? `/api/game/account_security/bind:get_bind_info?app_id=100067&access_token=${tk}`
                : `/api/game/account_security/bind:cancel_request?app_id=100067&access_token=${tk}`;

            const res = await fetch(url);
            const data = await res.json();

            // Populate Elite JSON View
            document.getElementById('o-email').innerText = `"${data.email || 'not_found'}"`;
            const pending = data.email_to_be_bind || data.email_to_be || "null";
            document.getElementById('o-pending').innerText = pending === "null" ? "null" : `"${pending}"`;
            document.getElementById('o-timer').innerText = data.request_exec_countdown || "0";
            document.getElementById('o-msg').innerText = `"${data.error_message || 'SUCCESS'}"`;
            
            const flag = document.getElementById('o-flag');
            if(pending === "null") {
                flag.innerHTML = '<span class="j-status" style="background:#064e3b; color:#34d399;">STABLE</span>';
            } else {
                flag.innerHTML = '<span class="j-status" style="background:#450a0a; color:#f87171;">VULNERABLE</span>';
            }

            document.getElementById('output-section').style.display = 'block';

        } catch (err) {
            alert("Connection Failed.");
        }
    }
</script>
</body>
</html>
